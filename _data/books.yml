- year: "2026 (so far)"
  books:
    - title: "East of Eden"
      author: "John Steinbeck"
      description: "To be honest, I was somewhat disappointed with Steinbeck's magnum opus. Its scale was ambitious but fell short, in my opinion. The scattered ensemble was hard to keep track of, and yet too little attention was paid to most of its cast for me to become emotionally invested."
    - title: "Angela's Ashes"
      author: "Frank McCourt"
      description: "While I'm somewhat doubtful of memoir writers that can recount entire conversations they supposedly witnessed when they were single digit ages, this was excellent. The contrast between the childlike innocence of McCourt's retelling and the abject squalor of their situation was really well done."

- year: "2025"
  books:
    - title: "Me Talk Pretty One Day"
      author: "David Sedaris"
      description: "I have a long-standing appreciation for written comedy. It is extra impressive to me that it can achieve comedic affect without the usual advantages of timing, vocal inflection, or dramatic pauses. That being said, this book felt like a soft breeze: pleasant in the moment, but passing without leaving a lasting impression."
    - title: "The Rape of Nanking"
      author: "Iris Chang"
      description: "On the gaotie (high-speed rail) to Nanking, I read Iris Chang's deeply moving account of the horrors of the Nanking Massacre. All of this is tragic: the content of the book as well as the fate of its author."
    - title: "This Is How You Lose The Time War"
      author: "Amal El-Mohtar and Max Gladstone"
      description: "Short but sweet, and also read on the train. To me, the prose felt gratuitous and verging on purple. While I appreciate the experimental funkiness of alternating authors for the two characters, it felt discordant at times."
    - title: "The Secret History"
      author: "Donna Tartt"
      description: "A classic re-read and long-standing favourite of mine. I find it sometimes favours establishing the spooky, haunting atmosphere over developing the plot, but not to its detriment. And featuring a wonderfully unreliable narrator."
    - title: "The Golem and the Jinni"
      author: "Helene Wecker"
      description: "One of my all-time favourites. A historical fiction-fantasy about not being quite human, told in a wonderfully quiet and magical way. Wecker weaves two different forms of mythology into a beautiful and understated novel. I re-read this every year, and I'm looking forward to the third book."
    - title: "Pride and Prejudice"
      author: "Jane Austen"
      description: "Despite being a huge fan of the 2004 movie, I had never gotten around to reading the book until now. There's nothing original to be said about Jane Austen, so I'll just say that this was much funnier than I anticipated it being, and a wonderful glimpse into a totally different time."
    - title: "What Was She Thinking? Notes on a Scandal"
      author: "Zoë Heller"
      description: "The scandal at the centre of this book can easily overshadow the element that is more understated, but masterfully done: the creepy involvement of the bystander who recounts the events of the book to you. I seem to love an unreliable narrator."
    - title: "Say Nothing"
      author: "Patrick Radden Keefe"
      description: "I'd previously read Keefe's compilation of his best New Yorker pieces, Rogues. He is a terrific writer: this book is thrilling, dramatic, and deeply human."
    - title: "Of Mice and Men"
      author: "John Steinbeck"
      description: "A commonly-assigned book in high school English classes that slipped me by until now. I read this for my book club and it was excellent for that exact purpose. Steinbeck is capable of telling good stories of any length."
    - title: "The Metamorphosis"
      author: "Franz Kafka"
      description: "Horrifying, exciting, and compulsively readable. It was much shorter than I'd anticipated and made for a delightful evening read."
    - title: "Consider the Lobster and Other Essays"
      author: "David Foster Wallace"
      description: "Wallace has this extremely distinctive, playful, and rough-around-the-edges style that I really admire, an eye for all sorts of quirky and interesting topics, and a love of footnotes I can't quite get behind. This essay collection was no exception. Particular favourites: “How Tracy Austin Broke My Heart;” “Up, Simba;” and “Certainly the End of Something or Other, One Would Sort of Have to Think.”"
    - title: "Invisible Cities"
      author: "Italo Calvino"
      description: "Dream-like and floating. The whimsical descriptions of cities makes me really admire Calvino's imagination, but didn't leave much of an impression on me."
    - title: "Human Acts"
      author: "Han Kang"
      description: "This book was hard. For me, the stripped-down writing style clashed heavily with the graphic and tragic events of the plot and reduced its emotional impact. Regardless, an interesting foray into a historical event I'd never heard of before."
    - title: "Everything is Tuberculosis"
      author: "John Green"
      description: "Very enjoyable and informative as an audiobook, the perfect length for the Megabus trip from Montreal to Toronto. I found the broader point about the disproportionate attention paid to tuberculosis relative to its prevalence fascinating, but some of the writing itself is too trite for my tastes."
    - title: "Rejection"
      author: "Tony Tulathimutte"
      description: "Recommended by Matt. It's extremely difficult to describe this book and the feelings it evokes. I can't even say for sure that it was an enjoyable experience, but definitely a memorable one. Tulathimutte nails his portrayal of the Internet age in a way that so many books and movies struggle with."